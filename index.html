<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>五子棋 - 连五游戏</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- 开始界面 -->
    <div class="start-screen" id="startScreen">
      <div class="start-card">
        <h1><i class="fas fa-gamepad"></i> 五子棋</h1>
        <p class="start-subtitle">连五游戏 - 策略游戏</p>

        <div class="mode-selection">
          <h2>选择游戏模式</h2>
          <div class="mode-buttons">
            <button class="mode-btn selected" id="pvpBtn" data-mode="pvp">
              <i class="fas fa-users"></i>
              <span>双人模式</span>
            </button>
            <button class="mode-btn" id="aiBtn" data-mode="ai">
              <i class="fas fa-robot"></i>
              <span>AI 模式</span>
            </button>
            <button class="mode-btn" id="onlineBtn" data-mode="online">
              <i class="fas fa-globe"></i>
              <span>在线对战</span>
            </button>
          </div>

          <div class="difficulty-selection" id="difficultySelection">
            <h3>选择 AI 难度</h3>
            <div class="difficulty-buttons">
              <button class="diff-btn selected" data-difficulty="easy">
                简单
              </button>
              <button class="diff-btn" data-difficulty="medium">中等</button>
              <button class="diff-btn" data-difficulty="hard">困难</button>
            </div>
          </div>

          <div class="online-lobby" id="onlineLobby">
            <h3>在线对战</h3>
            <div class="lobby-actions">
              <button class="btn btn-primary" id="createRoomBtn">
                <i class="fas fa-plus"></i> 创建房间
              </button>
              <div class="join-room">
                <input type="text" id="roomCodeInput" placeholder="输入房间码" maxlength="4" />
                <button class="btn btn-secondary" id="joinRoomBtn">
                  <i class="fas fa-sign-in-alt"></i> 加入
                </button>
              </div>
            </div>
          </div>
        </div>

        <button class="btn btn-primary start-btn" id="startBtn">
          <i class="fas fa-play"></i> 开始游戏
        </button>
      </div>
    </div>

    <div class="container">
      <header>
        <h1><i class="fas fa-gamepad"></i> 五子棋</h1>
        <p class="subtitle">连五游戏 - 策略游戏</p>
      </header>

      <main>
        <div class="game-area">
          <div class="game-info">
            <div class="game-mode" id="gameMode">双人模式</div>
            <div class="current-player" id="currentPlayer">
              <span class="player-icon black"></span>
              <span>黑方回合</span>
            </div>
            <div class="game-status" id="gameStatus">游戏进行中</div>
          </div>

          <div class="board-container">
            <canvas id="gameBoard" width="600" height="600"></canvas>
            <div class="board-overlay" id="boardOverlay"></div>
            <div class="online-overlay" id="onlineOverlay"></div>
            <div class="ai-thinking" id="aiThinking">
              <div class="thinking-dots">
                <span></span><span></span><span></span>
              </div>
              <span>AI 思考中...</span>
            </div>
          </div>

          <div class="controls">
            <button id="restartBtn" class="btn btn-primary">
              <i class="fas fa-redo"></i> 重新开始
            </button>
            <button id="undoBtn" class="btn btn-secondary" disabled>
              <i class="fas fa-undo"></i> 撤销落子
            </button>
            <button id="hintBtn" class="btn btn-secondary">
              <i class="fas fa-lightbulb"></i> 显示提示
            </button>
            <button id="replayBtn" class="btn btn-secondary" style="display: none">
              <i class="fas fa-film"></i> 棋谱回放
            </button>
          </div>

          <div class="replay-bar" id="replayBar" style="display: none">
            <div class="replay-controls">
              <button class="replay-btn replay-first" title="第一步"><i class="fas fa-fast-backward"></i></button>
              <button class="replay-btn replay-prev" title="上一步"><i class="fas fa-step-backward"></i></button>
              <button class="replay-btn replay-toggle" title="播放/暂停"><i class="fas fa-play"></i></button>
              <button class="replay-btn replay-next" title="下一步"><i class="fas fa-step-forward"></i></button>
              <button class="replay-btn replay-last" title="最后一步"><i class="fas fa-fast-forward"></i></button>
              <span class="replay-step">1 / 1</span>
              <div class="replay-speed-group">
                <button class="replay-btn replay-speed active" data-speed="1">1x</button>
                <button class="replay-btn replay-speed" data-speed="2">2x</button>
                <button class="replay-btn replay-speed" data-speed="4">4x</button>
              </div>
              <button class="replay-btn replay-exit" title="退出回放"><i class="fas fa-times"></i></button>
            </div>
          </div>
        </div>

        <div class="instructions">
          <h2><i class="fas fa-info-circle"></i> 游戏规则</h2>
          <ul>
            <li>
              <strong>目标:</strong> 首先将五个棋子连成一线（横、竖、斜均可）
            </li>
            <li><strong>黑棋</strong> 先行</li>
            <li>点击空白交叉点放置棋子</li>
            <li>玩家轮流落子</li>
            <li>当一方连成五子时游戏结束</li>
          </ul>
        </div>
      </main>

      <footer>
        <p>使用 HTML5 Canvas 和 JavaScript 制作 | 五子棋游戏</p>
      </footer>
    </div>

    <script type="module" src="js/game.js"></script>
  </body>
</html>
